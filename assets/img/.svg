<svg width="100%" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">


<defs>
  <!-- Teal glow gradient for outer ring -->
  <radialGradient id="rg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
  </radialGradient>

  <!-- Gold bar gradient -->
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FCD34D"/>
    <stop offset="50%" stop-color="#F59E0B"/>
    <stop offset="100%" stop-color="#D97706"/>
  </linearGradient>

  <!-- Deep inner shadow for depth -->
  <radialGradient id="inner" cx="50%" cy="50%" r="50%">
    <stop offset="30%" stop-color="#0C1628"/>
    <stop offset="100%" stop-color="#060D1A"/>
  </radialGradient>
</defs>

<!-- Outer glow bleed -->
<ellipse cx="150" cy="150" rx="130" ry="130" fill="url(#rg)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Outer diamond ring — thick teal -->
<polygon points="150,18 282,150 150,282 18,150" fill="none" stroke-width="3" style="fill:none;stroke:rgb(14, 165, 233);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Second ring — thin, inner -->
<polygon points="150,42 258,150 150,258 42,150" fill="none" stroke="#0EA5E9" stroke-width="0.8" opacity="0.3" style="fill:none;stroke:rgb(14, 165, 233);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Diamond body fill -->
<polygon points="150,42 258,150 150,258 42,150" fill="url(#inner)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Subtle grid lines inside -->
<line x1="96" y1="96" x2="204" y2="96" stroke="#0EA5E9" stroke-width="0.5" opacity="0.12" style="fill:rgb(0, 0, 0);stroke:rgb(14, 165, 233);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
