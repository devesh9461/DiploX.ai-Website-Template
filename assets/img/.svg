<line x1="96" y1="96" x2="96" y2="204" stroke="#0EA5E9" stroke-width="0.5" opacity="0.12" style="fill:rgb(0, 0, 0);stroke:rgb(14, 165, 233);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<line x1="150" y1="96" x2="150" y2="204" stroke="#0EA5E9" stroke-width="0.5" opacity="0.12" style="fill:rgb(0, 0, 0);stroke:rgb(14, 165, 233);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
